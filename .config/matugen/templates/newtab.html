<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Yomogi&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: {{colors.surface.default.hex}};
            --bg-alt: {{colors.surface_container.default.hex}};
            --fg: {{colors.on_surface.default.hex}};
            --fg-dim: {{colors.on_surface_variant.default.hex}};
            --primary: {{colors.primary.default.hex}};
            --accent: {{colors.tertiary.default.hex}};
            --border: {{colors.outline_variant.default.hex}};
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .greeting {
            font-family: 'Yomogi', cursive; 
            font-size: 5.5rem;
            margin-bottom: 2.5rem;
            color: var(--primary);
            text-align: center;
            letter-spacing: -2px;
        }

        .search-container {
            width: 100%;
            max-width: 550px;
            margin-bottom: 2.5rem;
        }

        .search-container input {
            width: 100%;
            background-color: var(--bg-alt);
            border: 1px solid var(--border);
            padding: 12px;
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px {{colors.primary.default.hex}}44; /* Added a subtle glow */
        }

        .links-grid {
            display: flex;
            gap: 6rem;
        }

        .column h2 {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 1.2rem;
            color: var(--accent);
        }

        .column ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .column ul li {
            margin-bottom: 0.6rem;
        }

        .column ul li a {
            color: var(--fg-dim);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.15s ease-in-out;
        }

        .column ul li a:hover {
            color: var(--fg);
            text-decoration: underline;
        }

        @media (max-width: 800px) {
            .links-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 2rem;
                padding: 20px;
            }
            .greeting {
                font-size: 3.5rem;
            }
            .search-container {
                margin-bottom: 2rem;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="greeting">ハローエブリーニャン。</div>

    <div class="search-container">
        <form action="https://www.google.com/search" method="GET">
            <input type="text" name="q" placeholder="Search..." autofocus>
        </form>
    </div>

    <div class="links-grid">
        <div class="column">
            <h2>日本語</h2>
            <ul>
                <li><a href="https://jisho.org">Jisho</a></li>
                <li><a href="https://www.wanikani.com">WaniKani</a></li>
                <li><a href="https://bunpro.jp">Bunpro</a></li>
                <li><a href="https://www.satorireader.com">Satori Reader</a></li>
            </ul>
        </div>

        <div class="column">
            <h2>Media</h2>
            <ul>
                <li><a href="https://www.youtube.com">YouTube</a></li>
                <li><a href="https://www.netflix.com">Netflix</a></li>
                <li><a href="https://news.web.nhk/news/easy/">NHK Easy News</a></li>
                <li><a href="https://bilingualmanga.org/">Bilingual Manga</a></li>
            </ul>
        </div>

        <div class="column">
            <h2>AI</h2>
            <ul>
                <li><a href="https://gemini.google.com">Gemini</a></li>
                <li><a href="https://chat.deepseek.com">DeepSeek</a></li>
            </ul>
        </div>

        <div class="column">
            <h2>Workspace</h2>
            <ul>
                <li><a href="https://mail.google.com">Gmail</a></li>
                <li><a href="https://github.com">GitHub</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
